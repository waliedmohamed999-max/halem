<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>مركز د. حليم لطب الأسنان</title>
    <style>
        :root {
            --bg: #edf8f4;
            --panel: rgba(255,255,255,.94);
            --ink: #17324d;
            --soft: #60798d;
            --brand: #0f8b8d;
            --brand-deep: #114c5f;
            --line: #d5e8e2;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Arial, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top right, rgba(15,139,141,.16), transparent 28%),
                radial-gradient(circle at bottom left, rgba(17,76,95,.12), transparent 26%),
                linear-gradient(180deg, #f7fcfa 0%, var(--bg) 100%);
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .card {
            width: min(100%, 920px);
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 28px;
            padding: 32px;
            box-shadow: 0 24px 60px rgba(17,76,95,.12);
        }
        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 999px;
            background: #e8f7f3;
            color: #136a6c;
            font-weight: 700;
            font-size: 14px;
        }
        h1 {
            margin: 20px 0 10px;
            font-size: clamp(32px, 5vw, 54px);
            line-height: 1.08;
            color: var(--brand-deep);
        }
        p {
            margin: 0;
            color: var(--soft);
            line-height: 1.9;
            font-size: 17px;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 28px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 52px;
            padding: 0 20px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 800;
            border: 1px solid transparent;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--brand), #11a6a8);
            color: #fff;
            box-shadow: 0 18px 34px rgba(15,139,141,.22);
        }
        .btn-outline {
            background: #fff;
            color: var(--brand-deep);
            border-color: #cfe4de;
        }
        .meta {
            margin-top: 28px;
            padding-top: 18px;
            border-top: 1px dashed #d3e4df;
            font-size: 14px;
            color: #6b8092;
        }
        @media (max-width: 640px) {
            .card { padding: 22px; border-radius: 22px; }
            .actions { flex-direction: column; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <main class="card">
        <span class="eyebrow">مركز د. حليم لطب الأسنان</span>
        <h1>الموقع يعمل الآن بصفحة هبوط مؤقتة</h1>
        <p>تم تفعيل صفحة ثابتة مؤقتة حتى يكتمل تشغيل النظام بالكامل على الاستضافة. يمكنك الحجز أو التواصل مباشرة من الروابط التالية بدون انتظار.</p>
        <div class="actions">
            <a class="btn btn-primary" href="https://wa.me/201028234921" target="_blank" rel="noopener">واتساب مباشر</a>
            <a class="btn btn-outline" href="tel:01028234921">اتصال مباشر</a>
            <a class="btn btn-outline" href="/ar/appointments/create">محاولة صفحة الحجز</a>
        </div>
        <div class="meta">هذه الصفحة مقصودة لإيقاف خطأ 500 على الواجهة الرئيسية فورًا.</div>
    </main>
</body>
</html>
